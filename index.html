<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поделиться номером</title>
    <script src="vk-bridge.js"></script>
</head>
<body>
    <h1>ОБРАБОТКА...</h1>
    <p id="status" style="color: blue; font-size: 20px;">Страница загружена. Ждем VK Bridge...</p>
    
    <script>
        function log(text) {
            document.getElementById('status').innerText = text;
            console.log(text);
        }

        log("Шаг 1: Проверка vkBridge...");
        
        if (typeof vkBridge === 'undefined') {
            log("ОШИБКА: vkBridge не загрузился!");
        } else {
            log("Шаг 2: vkBridge найден. Инициализация...");
            
            vkBridge.send('VKWebAppInit')
                .then(function() {
                    log("Шаг 3: Инициализация успешна. Читаем URL...");
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const userId = urlParams.get('vk_user_id');
                    
                    if (!userId) {
                        log("ОШИБКА: ВК не передал ID пользователя!");
                        return;
                    }
                    
                    log("Шаг 4: ID получен. Запрос номера...");
                    
                    vkBridge.send('VKWebAppGetPhoneNumber')
                        .then(function(data) {
                            // Выводим весь ответ ВК, чтобы увидеть структуру
                            log("Шаг 5: Ответ ВК: " + JSON.stringify(data));
                            
                            // Достаем номер из ответа
                            var phone = data.phone_number || data.phone || (data.payload && data.payload.phone) || "не найден";
                            
                            if (phone === "не найден") {
                                log("ОШИБКА: Номер не найден в ответе.");
                                return;
                            }

                            log("Шаг 5.1: Номер " + phone + ". Отправляем боту...");
                            
                            // ВСТАВЬТЕ СЮДА НОВУЮ ССЫЛКУ ОТ CLOUDFLARE
                            const BOT_WEBHOOK_URL = "https://helicopter-files-shade-making.trycloudflare.com/phone/";
                            
                            fetch(BOT_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ user_id: userId, phone: phone })
                            })
                            .then(function(response) {
                                if (response.ok) {
                                    log("Шаг 6: УСПЕХ! Бот получил номер.");
                                } else {
                                    log("ОШИБКА Шаг 6: Бот вернул " + response.status);
                                }
                            })
                            .catch(function(err) {
                                log("ОШИБКА Шаг 6: Fetch не удался: " + err.message);
                            });
                        })
                        .catch(function(err) {
                            log("ОШИБКА Шаг 5: Отказ в доступе: " + JSON.stringify(err));
                        });
                })
                .catch(function(err) {
                    log("ОШИБКА Шаг 3: " + JSON.stringify(err));
                });
        }
    </script>
</body>
</html>
