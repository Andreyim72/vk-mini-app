<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поделиться номером</title>
    <script src="https://cdn.jsdelivr.net/npm/@vk/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f0f2f5; color: #333; }
        h2 { color: #2787F5; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Обработка запроса...</h2>
    <p id="status">Инициализация...</p>
    
    <script>
        function setStatus(text, isError = false) {
            const el = document.getElementById('status');
            el.innerText = text;
            el.className = isError ? 'error' : '';
        }

        // Проверяем, загрузился ли скрипт вообще
        if (typeof vkBridge === 'undefined') {
            setStatus('Ошибка: VK Bridge не загружен. Проверьте интернет.', true);
        } else {
            vkBridge.send('VKWebAppInit')
                .then(() => {
                    setStatus('Инициализация успешна. Запрашиваем номер...');
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const userId = urlParams.get('vk_user_id');
                    
                    if (!userId) {
                        setStatus('Ошибка: ВК не передал ID пользователя. Вы открыли приложение не через ВК?', true);
                        return;
                    }

                    const BOT_WEBHOOK_URL = "https://using-avoiding-intelligence-undertake.trycloudflare.com/phone/"; 

                    vkBridge.send('VKWebAppGetPhoneNumber')
                        .then(data => {
                            const phone = data.phone;
                            setStatus("Номер получен: " + phone + ". Отправляем...");
                            
                            return fetch(BOT_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ user_id: userId, phone: phone })
                            });
                        })
                        .then(response => {
                            if (response.ok) {
                                setStatus("Готово! Можете закрыть окно.");
                            } else {
                                setStatus("Ошибка отправки боту (код " + response.status + ")", true);
                            }
                        })
                        .catch(error => {
                            setStatus("Отказ в доступе или ошибка: " + error.message, true);
                        });
                })
                .catch(err => {
                    setStatus("Ошибка инициализации ВК: " + JSON.stringify(err), true);
                });
        }
    </script>
</body>
</html>
