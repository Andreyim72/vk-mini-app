<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поделиться номером</title>
    <script src="https://cdn.jsdelivr.net/npm/@vk/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f0f2f5; color: #333; }
        h2 { color: #2787F5; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Обработка запроса...</h2>
    <p id="status">Запрашиваем разрешение...</p>
    
    <script>
        function setStatus(text, isError = false) {
            const el = document.getElementById('status');
            el.innerText = text;
            el.className = isError ? 'error' : '';
        }

        if (typeof vkBridge === 'undefined') {
            setStatus('Ошибка: VK Bridge не загружен.', true);
        } else {
            // Инициализируем, но не ждём ответа (чтобы не зависало)
            vkBridge.send('VKWebAppInit');
            
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('vk_user_id');
            
            if (!userId) {
                setStatus('Ошибка: ВК не передал ID пользователя.', true);
            } else {
                const BOT_WEBHOOK_URL = "https://using-avoiding-intelligence-undertake.trycloudflare.com/phone/"; 

                // Сразу запрашиваем номер
                vkBridge.send('VKWebAppGetPhoneNumber')
                    .then(data => {
                        const phone = data.phone;
                        setStatus("Номер получен: " + phone + ". Отправляем...");
                        
                        return fetch(BOT_WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: userId, phone: phone })
                        });
                    })
                    .then(response => {
                        if (response.ok) {
                            setStatus("Готово! Можете закрыть окно.");
                        } else {
                            setStatus("Ошибка отправки боту (код " + response.status + ")", true);
                        }
                    })
                    .catch(error => {
                        setStatus("Отказ в доступе или ошибка: " + error.message, true);
                    });
            }
        }
    </script>
</body>
</html>
