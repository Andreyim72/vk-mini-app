<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поделиться номером</title>
    <!-- Надежный источник VK Bridge -->
    <script src="vk-bridge.js"></script>
</head>
<body>
    <h1>ТЕСТ ПРИЛОЖЕНИЯ</h1>
    <p id="status" style="color: blue; font-size: 20px;">Страница загружена. Ждем VK Bridge...</p>
    
    <script>
        // Функция для вывода текста на экран
        function log(text) {
            document.getElementById('status').innerText = text;
            console.log(text); // Дублируем в консоль браузера
        }

        // Шаг 1
        log("Шаг 1: Проверка vkBridge...");
        
        if (typeof vkBridge === 'undefined') {
            log("ОШИБКА: vkBridge не загрузился (проверьте блокировщики рекламы)!");
        } else {
            log("Шаг 2: vkBridge найден. Инициализация...");
            
            vkBridge.send('VKWebAppInit')
                .then(function() {
                    log("Шаг 3: Инициализация успешна. Читаем URL...");
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const userId = urlParams.get('vk_user_id');
                    
                    if (!userId) {
                        log("ОШИБКА: ВК не передал ID пользователя в URL!");
                        return;
                    }
                    
                    log("Шаг 4: ID пользователя получен (" + userId + "). Запрос номера...");
                    
                    vkBridge.send('VKWebAppGetPhoneNumber')
                        .then(function(data) {
                            const phone = data.phone;
                            log("Шаг 5: Номер получен: " + phone + ". Отправляем боту...");
                            
                            const BOT_WEBHOOK_URL = "https://grande-oval-called-shopper.trycloudflare.com/phone/";
                            
                            fetch(BOT_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ user_id: userId, phone: phone })
                            })
                            .then(function(response) {
                                if (response.ok) {
                                    log("Шаг 6: УСПЕХ! Бот получил номер. Можно закрывать окно.");
                                } else {
                                    log("ОШИБКА Шаг 6: Бот вернул ошибку " + response.status);
                                }
                            })
                            .catch(function(err) {
                                log("ОШИБКА Шаг 6: Не удалось отправить боту: " + err.message);
                            });
                        })
                        .catch(function(err) {
                            log("ОШИБКА Шаг 5: Пользователь отказал в доступе или ошибка: " + JSON.stringify(err));
                        });
                })
                .catch(function(err) {
                    log("ОШИБКА Шаг 3: Ошибка инициализации: " + JSON.stringify(err));
                });
        }
    </script>
</body>
</html>
